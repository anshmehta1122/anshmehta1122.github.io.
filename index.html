<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDPSDJ ERP Portal — Academic Session 2026-27</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f6fa;--surface:#fff;--surface2:#f0f2f8;--border:#e2e5f0;
  --accent:#6B3FA0;--accent2:#4A90D9;--accent-light:#f0eaf8;
  --text:#1a1a2e;--text2:#5a5f7a;--text3:#9499b5;
  --success:#22a06b;--warn:#e6a817;--danger:#d93025;--info:#1a73e8;
  --sidebar-w:240px;--header-h:60px;
  --r:8px;--r2:12px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
/* ===== LOGIN ===== */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}
.login-card{background:#fff;border-radius:16px;padding:40px;width:420px;max-width:95vw;box-shadow:0 24px 64px rgba(0,0,0,.25)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{width:80px;height:80px;border-radius:50%}
.login-school{text-align:center;margin-bottom:28px; font-size:32px;}
.login-school h2{font-size:16px;font-weight:700;color:#1a1a2e;line-height:1.3}
.login-school p{font-size:12px;color:#5a5f7a;margin-top:4px}
.login-tabs{display:flex;gap:8px;margin-bottom:24px;background:#f5f6fa;border-radius:10px;padding:4px}
.ltab{flex:1;padding:8px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#5a5f7a;transition:.2s}
.ltab.active{background:#6B3FA0;color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#5a5f7a;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1.5px solid #e2e5f0;border-radius:8px;font-size:14px;outline:none;transition:.2s;background:#fff}
.form-group input:focus,.form-group select:focus{border-color:#6B3FA0;box-shadow:0 0 0 3px rgba(107,63,160,.1)}
.btn-login{width:100%;padding:12px;background:#6B3FA0;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.btn-login:hover{background:#5a34a0}
.login-hint{margin-top:16px;background:#f0eaf8;border-radius:8px;padding:12px;font-size:12px;color:#5a5f7a}
.login-hint strong{color:#6B3FA0}

/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:#1a1a2e;overflow-y:auto;z-index:100;transition:.3s}
.sidebar-header{padding:16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo{display:flex;align-items:center;gap:10px}
.sidebar-logo img{width:36px;height:36px;border-radius:50%}
.sidebar-logo span{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.sidebar-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px}
.sidebar-user .name{font-size:13px;font-weight:600;color:#fff}
.sidebar-user .role-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.role-student{background:#4A90D9;color:#fff}
.role-teacher{background:#22a06b;color:#fff}
.role-admin{background:#e6a817;color:#1a1a2e}
.sidebar-nav{padding:8px}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px;padding:12px 12px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;transition:.15s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:#6B3FA0;color:#fff}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center}
.nav-item .badge{margin-left:auto;background:#d93025;color:#fff;font-size:10px;padding:1px 6px;border-radius:10px}

.topbar{position:fixed;left:var(--sidebar-w);right:0;top:0;height:var(--header-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;z-index:99}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);flex:1}
.topbar-actions{display:flex;align-items:center;gap:12px}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text2);transition:.15s;position:relative}
.icon-btn:hover{background:var(--surface2)}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;background:#d93025;border-radius:50%;border:2px solid #fff}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer}

.main-content{margin-left:var(--sidebar-w);margin-top:var(--header-h);padding:24px;min-height:calc(100vh - var(--header-h));overflow-x:hidden}

/* ===== CARDS & COMPONENTS ===== */
.page{display:none}
.page.active{display:block}
.page-header{margin-bottom:20px}
.page-header h1{font-size:22px;font-weight:700;color:var(--text)}
.page-header p{font-size:13px;color:var(--text2);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-header h3{font-size:15px;font-weight:700;color:var(--text)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-purple::before{background:#6B3FA0}
.stat-blue::before{background:#4A90D9}
.stat-green::before{background:#22a06b}
.stat-orange::before{background:#e6a817}
.stat-red::before{background:#d93025}
.stat-card .stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px}
.si-purple{background:#f0eaf8;color:#6B3FA0}
.si-blue{background:#e8f2fc;color:#4A90D9}
.si-green{background:#e8f8f2;color:#22a06b}
.si-orange{background:#fef6e5;color:#e6a817}
.si-red{background:#fce8e8;color:#d93025}
.stat-card .stat-num{font-size:24px;font-weight:700;color:var(--text);line-height:1}
.stat-card .stat-label{font-size:12px;color:var(--text2);margin-top:6px}
.btn{padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#6B3FA0;color:#fff}
.btn-primary:hover{background:#5a34a0}
.btn-secondary{background:var(--surface2);color:var(--text)}
.btn-secondary:hover{background:#e2e5f0}
.btn-success{background:#22a06b;color:#fff}
.btn-danger{background:#d93025;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-outline:hover{background:var(--surface2)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#e8f8f2;color:#22a06b}
.badge-red{background:#fce8e8;color:#d93025}
.badge-blue{background:#e8f2fc;color:#4A90D9}
.badge-orange{background:#fef6e5;color:#e6a817}
.badge-purple{background:#f0eaf8;color:#6B3FA0}
.badge-gray{background:#f0f2f8;color:#5a5f7a}
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.form-group2{flex:1;min-width:180px}
.form-group2 label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-group2 input,.form-group2 select,.form-group2 textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;outline:none;transition:.2s;font-family:inherit;background:#fff}
.form-group2 input:focus,.form-group2 select:focus,.form-group2 textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.form-group2 textarea{resize:vertical;min-height:80px}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface2);border-radius:var(--r);padding:4px}
.tab{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:.15s}
.tab.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.notice-card{border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px;transition:.15s}
.notice-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.notice-card .nc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:12px}
.notice-card .nc-title{font-size:14px;font-weight:700;color:var(--text)}
.notice-card .nc-meta{font-size:12px;color:var(--text2);margin-bottom:8px}
.notice-card .nc-body{font-size:13px;color:var(--text);line-height:1.6}
.urgent-banner{background:linear-gradient(135deg,#d93025,#e84436);color:#fff;border-radius:var(--r2);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.urgent-banner .ub-icon{font-size:22px}
.urgent-banner .ub-text strong{display:block;font-weight:700}
.urgent-banner .ub-text span{font-size:12px;opacity:.9}
.att-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.att-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.att-p{background:#e8f8f2;color:#22a06b}
.att-a{background:#fce8e8;color:#d93025}
.att-h{background:#f0f2f8;color:#9499b5}
.att-l{background:#fef6e5;color:#e6a817}
.progress-bar{height:8px;background:#f0f2f8;border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;transition:.3s}
.pf-green{background:#22a06b}
.pf-orange{background:#e6a817}
.pf-red{background:#d93025}
.pf-blue{background:#4A90D9}
.fee-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.fee-row:last-child{border-bottom:none}
.subject-chip{display:inline-block;padding:4px 10px;background:var(--accent-light);color:var(--accent);border-radius:20px;font-size:12px;font-weight:600;margin:2px}
.timetable{display:grid;gap:2px}
.tt-row{display:grid;grid-template-columns:80px repeat(6,1fr);gap:2px}
.tt-cell{padding:8px 6px;border-radius:6px;font-size:11px;text-align:center;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.tt-head{background:var(--surface2);font-weight:700;font-size:11px;color:var(--text2)}
.tt-time{background:var(--surface2);font-weight:600;color:var(--text2)}
.tt-sub{color:#fff;font-weight:600}
.sub-eng{background:#4A90D9}.sub-hin{background:#e6a817}.sub-mat{background:#6B3FA0}.sub-sci{background:#22a06b}.sub-sst{background:#e84436}.sub-comp{background:#17a2b8}.sub-san{background:#fd7e14}.sub-phy{background:#6610f2}.sub-che{background:#20c997}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:var(--r2);padding:24px;width:560px;max-width:100%;max-height:85vh;overflow-y:auto;position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-header h3{font-size:16px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-close:hover{background:var(--border)}
.alert{padding:12px 16px;border-radius:var(--r);margin-bottom:16px;font-size:13px;display:flex;align-items:center;gap:10px}
.alert-success{background:#e8f8f2;color:#22a06b;border-left:3px solid #22a06b}
.alert-danger{background:#fce8e8;color:#d93025;border-left:3px solid #d93025}
.alert-info{background:#e8f2fc;color:#1a73e8;border-left:3px solid #1a73e8}
.alert-warn{background:#fef6e5;color:#e6a817;border-left:3px solid #e6a817}
.empty-state{text-align:center;padding:48px 24px;color:var(--text2)}
.empty-state .es-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty-state p{font-size:14px}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--r);padding:8px 12px;margin-bottom:16px}
.search-bar input{flex:1;border:none;background:transparent;font-size:13px;outline:none;color:var(--text)}
.search-bar input::placeholder{color:var(--text3)}
.profile-header{display:flex;align-items:center;gap:20px;padding:20px;background:linear-gradient(135deg,var(--accent) 0%,#4A90D9 100%);border-radius:var(--r2);color:#fff;margin-bottom:20px}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;border:3px solid rgba(255,255,255,.4);flex-shrink:0}
.profile-info h2{font-size:20px;font-weight:700}
.profile-info p{font-size:13px;opacity:.85;margin-top:4px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.detail-row{padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:16px}
.detail-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;min-width:140px;flex-shrink:0}
.detail-value{font-size:13px;color:var(--text)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r2);padding:32px;text-align:center;cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-light)}
.upload-zone .uz-icon{font-size:36px;color:var(--text3);margin-bottom:12px}
.upload-zone p{font-size:13px;color:var(--text2)}
.upload-zone span{font-size:12px;color:var(--text3)}
.hw-card{border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.hw-card .hw-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hw-card .hw-sub{font-size:12px;font-weight:600;color:var(--accent)}
.hw-card .hw-title{font-size:14px;font-weight:700;margin-bottom:6px}
.hw-card .hw-due{font-size:12px;color:var(--text2)}
.chat-msg{padding:12px;border-radius:var(--r);margin-bottom:10px;max-width:75%}
.chat-msg.student-msg{background:var(--accent-light);margin-left:auto}
.chat-msg.teacher-reply{background:var(--surface2)}
.sitting-table{display:grid;gap:12px}
.seat-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.seat{width:90px;padding:8px;border:1px solid var(--border);border-radius:var(--r);text-align:center;font-size:11px}
.seat.assigned{background:var(--accent-light);border-color:var(--accent)}
.seat .seat-num{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:2px}
.admit-card{border:2px solid var(--accent);border-radius:var(--r2);padding:20px}
.admit-header{text-align:center;border-bottom:2px solid var(--accent);padding-bottom:16px;margin-bottom:16px}
.admit-header h2{color:var(--accent);font-size:18px}
.admit-header p{font-size:12px;color:var(--text2)}
.salary-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.salary-row:last-child{border-bottom:none;font-weight:700;font-size:15px}
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-row select,.filter-row input{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;outline:none;background:#fff;color:var(--text)}
.filter-row select:focus,.filter-row input:focus{border-color:var(--accent)}
.letter-preview{background:#fff;padding:40px;border:1px solid var(--border);border-radius:var(--r2);max-width:680px;margin:0 auto;line-height:1.7}
.letter-preview .lp-header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:3px solid var(--accent)}
.letter-preview .lp-date{text-align:right;margin-bottom:20px;font-size:13px;color:var(--text2)}
.letter-preview .lp-body{font-size:13px}
.scroll-table{overflow-x:auto}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}

  #menu-toggle{
      display:block !important;
  }

  .main-content{margin-left:0}
  .topbar{left:0}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:1fr}
  .grid-2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#6B3FA0,#4A90D9);display:flex;align-items:center;justify-content:center;margin:0 auto">
        <span style="color:#fff;font-size:28px;font-weight:900">SD</span>
      </div>
    </div>
    <div class="login-school">
      <h2><b>S.D. Public School Duplicate, Jagadhri</b></h2>
      <p>Affiliated to CBSE, New Delhi · Academic Session 2026-27</p>

    </div>
            <div style="color:rgb(112, 33, 177);font-size:17px;font-weight:900; text-align:center; padding-bottom: 10px;">
                  <h2><b>ERP PORTAL</b></h2>
                </div>

    <div class="login-tabs">
      <div class="ltab active" onclick="switchLoginTab('student')">🎓 Student</div>
      <div class="ltab" onclick="switchLoginTab('teacher')">👩‍🏫 Teacher</div>
      <div class="ltab" onclick="switchLoginTab('admin')">🔐 Admin</div>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="e.g. kamal.lal44" autocomplete="username">
      </div>
      <div class="form-group">
        <label>School ID</label>
        <input type="text" id="login-schoolid" placeholder="e.g. SD010001" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password" value="school@2026">
      </div>
      <button class="btn-login" onclick="doLogin()">Sign In →</button>
      <div id="login-error" style="color:#d93025;font-size:12px;margin-top:10px;display:none"></div>
    </div>
    <div class="login-hint" id="login-hint">
      
      <em style="font-size:11px">Password: school@2026 for all users</em>
    </div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div id="app">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6B3FA0,#4A90D9);display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#fff;font-size:14px;font-weight:900">SD</span></div>
        <span>SDPSDJ<br><span style="font-weight:400;font-size:10px;opacity:.6">ERP Portal</span></span>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="name" id="sb-name">Loading...</div>
      <div id="sb-role-badge"></div>
      <div style="font-size:11px;color:rgba(255,255,255,.45);margin-top:4px" id="sb-id"></div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div style="padding:16px;margin-top:auto;border-top:1px solid rgba(255,255,255,.08)">
      <div class="nav-item" onclick="logout()" style="color:#d93025">
        <span class="nav-icon">🚪</span> Logout
      </div>
    </div>
  </nav>

function doLogin() {
  const uname = document.getElementById('login-username').value.trim().toLowerCase();
  const sid = document.getElementById('login-schoolid').value.trim();
  const pass = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display='none';
  if(!uname||!sid||!pass){errEl.textContent='Please fill all fields.';errEl.style.display='block';return;}
  if(pass!=='school@2026'){errEl.textContent='Incorrect password.';errEl.style.display='block';return;}

  // Try student
  let user = STUDENTS.find(s=>s.u.toLowerCase()===uname && s.id.toUpperCase()===sid.toUpperCase());
  if(user){currentUser={...user,role:'student',class:user.c,section:user.s,name:user.n};initApp();return;}

  // Try teacher
  user = TEACHERS.find(t=>t.u.toLowerCase()===uname && t.id.toUpperCase()===sid.toUpperCase());
  if(user){currentUser={...user,role:'teacher',name:user.n};initApp();return;}

  // Try admin
  user = ADMINS.find(a=>a.u.toLowerCase()===uname && a.id.toUpperCase()===sid.toUpperCase());
  if(user){currentUser={...user,role:'admin',name:user.n};initApp();return;}

  errEl.textContent='Invalid credentials. Check username, ID, and password.';
  errEl.style.display='block';
}

document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function showModal(title, content) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-content').innerHTML = content;
  document.getElementById('modal-overlay').style.display='flex';
}
function closeModal(e) {
  if(!e || e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').style.display='none';
}
function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `alert alert-${type}`;
  t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;width:320px;box-shadow:0 4px 20px rgba(0,0,0,.15)';
  t.innerHTML = `<span>${type==='success'?'✅':type==='danger'?'❌':'ℹ️'}</span> ${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
function fmt(cls, sec) { return cls && sec ? `${cls}-${sec}` : (cls||''); }
function myClasses() {
  if(currentUser.role==='student') return [{c:currentUser.class,s:currentUser.section}];
  if(currentUser.role==='teacher') return currentUser.classes||[];
  return [];
}
function filterForMe(arr) {
  const mc = myClasses();
  return arr.filter(item=>mc.some(x=>x.c===item.class && x.s===item.section));
}

function handleAssignmentUpload(event){

    const file = event.target.files[0];

        "selectedAssignmentFile"
    ).innerHTML = file.name;

function fileToBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.onload = () =>
            resolve(reader.result);

        reader.onerror = reject;

        reader.readAsDataURL(file);

    });

}

function switchTab(el, showId) {
  el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const parent = el.closest('.main-content')||el.closest('#main-content')||document.getElementById('main-content');
  const allSections = showId.includes('notices')||showId.includes('circulars') ? ['tab-notices','tab-circulars'] : null;
  if(allSections) allSections.forEach(id=>{const el2=document.getElementById(id);if(el2)el2.style.display=id===showId?'block':'none';});
}

let ATTENDANCE_RECORDS = JSON.parse(localStorage.getItem('attendanceRecords') || '[]');
function renderTeacherAttendance() {
  const mc = myClasses();
  const selClass = mc[0]||{c:'IX',s:'A'};
  const students = STUDENTS.filter(st=>st.c===selClass.c&&st.s===selClass.s);
    const today = new Date().toISOString().split('T')[0];
  return `<div class="page-header"><h1>Mark Attendance</h1></div>
  <div class="card" style="margin-bottom:16px">
    <div class="filter-row">
      <div class="form-group2"><label>Class & Section</label><select onchange="renderTeacherAttendanceFor(this.value)">${mc.map(c=>`<option value="${c.c}-${c.s}">${c.c}-${c.s}</option>`).join('')}</select></div>
      <div class="form-group2"><label>Date</label><input type="date" value="${today}"></div>
    </div>
  </div>
  <div class="card" id="att-list">
    <div class="card-header"><h3>Students – ${selClass.c}-${selClass.s}</h3><div><button class="btn btn-sm btn-success" onclick="markAllPresent()">✅ Mark All Present</button></div></div>
    <table><thead><tr><th>#</th><th>Student Name</th><th>ID</th><th>Status</th></tr></thead>
    <tbody>${students.map((st,i)=>`<tr><td>${i+1}</td><td>${st.n}</td><td><code>${st.id}</code></td><td>
      <select class="att-sel" data-id="${st.id}" style="padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;background:#fff">
        <option value="P">Present</option><option value="A">Absent</option><option value="L">Leave</option>
      </select></td></tr>`).join('')}</tbody></table>
    <div style="margin-top:16px;display:flex;gap:12px">
      <button class="btn btn-primary" onclick="saveAttendance()">💾 Save Attendance</button>
      <button class="btn btn-outline" onclick="toast('Attendance report generated.','success')">📊 View Report</button>
    </div>
    <div class="card" id="attendance-history" style="margin-top:16px">
</div>
  </div>`;
}
function markAllPresent() {
  document.querySelectorAll('.att-sel').forEach(s=>s.value='P');
  toast('All students marked Present.','success');
}
function saveAttendance() {
  const date = document.querySelector('input[type="date"]').value;

  document.querySelectorAll('.att-sel').forEach(s => {
    ATTENDANCE_RECORDS.push({
      date,
      studentId: s.dataset.id,
      status: s.value
    });
  });

  localStorage.setItem(
    'attendanceRecords',
    JSON.stringify(ATTENDANCE_RECORDS)
  );

  toast('Attendance saved successfully.','success');

  renderAttendanceHistory();
}
function renderAttendanceHistory() {

  const box = document.getElementById('attendance-history');
  if(!box) return;

  const grouped = {};

  ATTENDANCE_RECORDS.forEach(r => {
    if(!grouped[r.date]) grouped[r.date] = [];
    grouped[r.date].push(r);
  });

  const dates = Object.keys(grouped).sort().reverse();

  box.innerHTML = `
    <div class="card-header">
      <h3>Attendance History</h3>
    </div>

    ${
      dates.length === 0
      ? '<p>No attendance records found.</p>'
      : dates.map(date => `
        <div style="margin-bottom:18px">
          <h4 style="margin-bottom:10px">${date}</h4>

          <table>
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              ${
                grouped[date].map(r => `
                  <tr>
                    <td>${r.studentId}</td>
                    <td>
                      ${
                        r.status === 'P'
                        ? '✅ Present'
                        : r.status === 'A'
                        ? '❌ Absent'
                        : '🟡 Leave'
                      }
                    </td>
                  </tr>
                `).join('')
              }
            </tbody>
          </table>
        </div>
      `).join('')
    }
  `;
}
setTimeout(renderAttendanceHistory, 100);

function uploadCircular() {

  const title = document.getElementById('ac-title').value.trim();
  const body = document.getElementById('ac-body').value.trim();
  const pdfFile = document.getElementById('circular-pdf').files[0];

  if (!title || !body) {
    toast('Please fill all fields.','danger');
    return;
  }

  function saveCircular(pdfData = null, pdfName = null) {

    DB.circulars.unshift({
      id: Date.now(),
      title: `Circular – ${title}`,
      body,
      author: currentUser.name,
      date: new Date().toISOString().split('T')[0],
      for: recipients,
      pdf: pdfData,
      pdfName: pdfName
    });

    localStorage.setItem('erpDB', JSON.stringify(DB));

    toast('Circular published!','success');

    showPage('notices');
  }

  if (pdfFile) {

    const reader = new FileReader();

    reader.onload = function(e) {
      saveCircular(
        e.target.result,
        pdfFile.name
      );
    };

    reader.readAsDataURL(pdfFile);

  } else {
 const recipients = [...document.querySelectorAll('.circular-recipient:checked')]
  .map(cb => cb.value);

if(recipients.length === 0){
  toast('Please select at least one recipient.','danger');
  return;
}

    saveCircular();

  }
}

             value="admin">
      Admin
    </label>

  </div>
</div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="uploadDoc()">Upload Document</button>
  </div>
  <div class="card scroll-table">
    <div class="card-header"><h3>All Documents</h3><button class="btn btn-sm btn-outline" onclick="toast('All documents zipped and downloading...','success')">⬇ Download All</button></div>
    <table><thead><tr><th>#</th><th>Document Name</th><th>Type</th><th>Date</th><th>Size</th>
<th>Visible To</th>
<th>Actions</th></tr></thead>
    <tbody id="doc-tbl">
${schoolDocs.map((d,i)=>`
<tr>
  <td>${i+1}</td>

  <td>
    <strong>${d.name}</strong>
  </td>

  <td>
    <span class="badge badge-blue">
      ${(d.type || 'FILE').toUpperCase()}
    </span>
  </td>

  <td>${d.date}</td>

  <td>${d.size}</td>

  <td>
    ${d.visibleTo
      ? d.visibleTo.join(', ')
      : 'All'
    }
  </td>

  <td>
    ${
      d.fileData
      ? `
      <a href="${d.fileData}"
         download="${d.fileName}"
         class="btn btn-sm btn-outline">
         ⬇ Download
      </a>
      `
      : `
      <button class="btn btn-sm btn-outline"
              onclick="toast('Document unavailable.','danger')">
         ⬇ Download
      </button>
      `
    }

    <button class="btn btn-sm btn-danger"
            onclick="toast('Document deleted.','danger')">
      Delete
    </button>
  </td>

</tr>
`).join('')}
</tbody>
</table>
</div>`;
}
function uploadDoc() {

  const name = document.getElementById('doc-name').value.trim();
  const file = document.getElementById('doc-file').files[0];

  if(!name){
    toast('Please enter document name.','danger');
    return;
  }

  if(!file){
    toast('Please select a file.','danger');
    return;
  }

  const visibleTo =
    [...document.querySelectorAll('.doc-visible:checked')]
      .map(x=>x.value);

  if(visibleTo.length===0){
    toast('Select at least one visibility option.','danger');
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){

    schoolDocs.push({
      id: Date.now(),
      name,
      type: file.name.split('.').pop().toLowerCase(),
      date: new Date().toISOString().split('T')[0],
      size: (file.size/1024/1024).toFixed(2)+' MB',
      fileData: e.target.result,
      fileName: file.name,
      visibleTo
    });

    localStorage.setItem(
      'schoolDocs',
      JSON.stringify(schoolDocs)
    );

    toast('Document uploaded!','success');

    showPage('a-docs');
  };

  reader.readAsDataURL(file);
}
